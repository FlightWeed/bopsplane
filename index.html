<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Fun Landing Page</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:Arial, sans-serif;

}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#0f0f0f,#1f1f1f);

overflow:hidden;

}

.container{

text-align:center;

}

h1{

font-size:3rem;

margin-bottom:35px;

font-weight:bold;

background:linear-gradient(

90deg,

#ff0080,

#ff8c00,

#00ffd5,

#7b68ee,

#00ff99

);

background-size:300%;

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

animation:glow 5s linear infinite;

}

@keyframes glow{

0%{

background-position:0% 50%;

}

100%{

background-position:300% 50%;

}

}

.enter-btn{

padding:18px 60px;

font-size:1.3rem;

font-weight:bold;

border:none;

border-radius:14px;

cursor:pointer;

color:white;

background:linear-gradient(135deg,#ff0080,#7b68ee);

box-shadow:0 0 20px rgba(255,0,128,0.5);

transition:0.25s ease;

}

.enter-btn:hover{

transform:scale(1.08);

box-shadow:0 0 30px rgba(123,104,238,0.9);

}

</style>

</head>

<body onclick="goNext()">

<div class="container">

<h1>Are You Ready To See The piper Files?</h1>

<button class="enter-btn" onclick="goNext()">

Enter

</button>

</div>

<script>

function goNext(){

window.location.href = "https://discord.gg/zNwC8C27kS";

}

// Let keyboard users activate the page with Enter or Space too.
document.addEventListener("keydown", function(event){
if(event.key === "Enter" || event.key === " "){
goNext();
}
});

</script>

</body>

</html>
